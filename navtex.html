        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }

        /* Leaflet Custom Icon Wrapper */
        .leaflet-custom-marker-wrap {
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        /* Marker CSS */
        .navtex-marker {
            background-color: white;
            border: 2px solid #0f172a;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
            color: #0f172a;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);

            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            cursor: default;
            white-space: nowrap;
            width: max-content;
        }
        .navtex-marker.active {
            background-color: #ef4444;
            border-color: #991b1b;
            color: white;
            transform: scale(1.1);
            z-index: 999 !important;
        }
        .marker-letter {
            background: #0f172a;
            color: white;
            border-radius: 4px;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }
        .navtex-marker.active .marker-letter {
            background: white;
            color: #ef4444;
        }

        /* Hidden textarea for copying */
        .sr-only-copy {
            position: absolute;
            left: -9999px;
            top: -9999px;

        // Initialize Map (Leaflet JS for secure iframe compatibility)
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-2.0, 118.0], 4);

        // Add Zoom Control at the bottom right
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Tile layer Carto Voyager
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        let stationMarkers = [];
        let radiusLayers = [];
        let routeLayer = null;

        // Render Navtex Points
        function drawNavtexMap(affectedIds = []) {
            // Clear previous markers & radiuses
            stationMarkers.forEach(m => map.removeLayer(m));
            radiusLayers.forEach(r => map.removeLayer(r));
            stationMarkers = [];
            radiusLayers = [];

            navtexStations.forEach(station => {
                const isAffected = affectedIds.includes(station.id);
                
                // Dynamic styling
                const fillColor = isAffected ? '#fca5a5' : '#e2e8f0'; // Light red / Grey
                const fillOpacity = isAffected ? 0.2 : 0.05;
                const lineColor = isAffected ? '#dc2626' : '#94a3b8'; // Dark red / Dark grey

                // Create Custom HTML Marker via Leaflet divIcon
                const iconHtml = `
                    <div class="navtex-marker ${isAffected ? 'active' : ''}">
                        <div class="marker-letter">${station.b1}</div>
                        <span>${station.name}</span>
                    </div>
                `;

                const customIcon = L.divIcon({
                    html: iconHtml,
                    className: 'leaflet-custom-marker-wrap',
                    iconSize: [120, 30], // Generic bounding box to prevent Leaflet clipping
                    iconAnchor: [60, 15] // Center the anchor
                });

                const marker = L.marker([station.lat, station.lng], { 
                    icon: customIcon,
                    zIndexOffset: isAffected ? 1000 : 0
                }).addTo(map);
                
                stationMarkers.push(marker);

                // Create 400 NM Radius Circle Geometry (Turf.js -> GeoJSON -> Leaflet)
                const center = [station.lng, station.lat];
                const options = { steps: 64, units: 'nauticalmiles' };
                const circleGeojson = turf.circle(center, station.range, options);
                
                const circleLayer = L.geoJSON(circleGeojson, {
                    style: {
                        color: lineColor,
                        weight: 1.5,
                        dashArray: '4, 4',
                        fillColor: fillColor,
                        fillOpacity: fillOpacity
                    }
                }).addTo(map);
                
                radiusLayers.push(circleLayer);
            });
        }

        // Initial Map Render
        drawNavtexMap();

        // --- FILE UPLOAD HANDLER ---
        document.getElementById('route-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Simple loading state
            document.getElementById('affected-list').innerHTML = `
                <div class="flex justify-center items-center py-10 text-blue-600">
                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin"></i>
                </div>
            `;
            lucide.createIcons();

            const reader = new FileReader();
            reader.onload = function(evt) {
                const content = evt.target.result;
                const ext = file.name.split('.').pop().toLowerCase();
                let coordinates = [];

                setTimeout(() => {
                    try {
                        if (ext === 'rtz') {
                            coordinates = parseRTZ(content);
                        } else if (ext === 'txt' || ext === 'csv' || ext === 'rou') {
                            coordinates = parseCSV_TXT(content);
                        }

                        if (coordinates.length < 2) {
                            alert("Unknown format or the file contains less than 2 waypoints.");
                            resetApp();
                            return;
                        }

                        processVoyageRoute(coordinates);
                    } catch (err) {
                        console.error(err);
                        alert("A system error occurred while reading the file.");
                        resetApp();
                    }
                }, 300); // Simulated delay to prevent UI freeze
            };
            reader.readAsText(file);
        });

        // RTZ Parser (Standard ECDIS XML format)
        function parseRTZ(xmlStr) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
            const waypoints = xmlDoc.getElementsByTagName("waypoint");
            const coords = [];
            
            for (let i = 0; i < waypoints.length; i++) {
                const pos = waypoints[i].getElementsByTagName("position")[0];
                if (pos) {
                    const lat = parseFloat(pos.getAttribute("lat"));
                    const lon = parseFloat(pos.getAttribute("lon"));
                    if (!isNaN(lat) && !isNaN(lon)) coords.push([lon, lat]);
                }
            }
            return coords;
        }

        // TXT/CSV/ROU Parser (Decimal Coordinates: DD with optional N/S/E/W)
        function parseCSV_TXT(text) {
            const coords = [];
            const lines = text.split('\n');

            lines.forEach(line => {
                // Match decimal numbers with optional direction (e.g., -12.345, 12.345, 12.345N, 12.345 N)
                const matches = [...line.matchAll(/(-?\d+\.\d+)[°\s]*([NSEW])?/gi)];
                
                if (matches.length >= 2) {
                    let val1 = parseFloat(matches[0][1]);
                    const dir1 = matches[0][2] ? matches[0][2].toUpperCase() : '';
                    if (dir1 === 'S' || dir1 === 'W') val1 = -Math.abs(val1);

                    let val2 = parseFloat(matches[1][1]);
                    const dir2 = matches[1][2] ? matches[1][2].toUpperCase() : '';
                    if (dir2 === 'S' || dir2 === 'W') val2 = -Math.abs(val2);
                    
                    let lat, lon;
                    
                    // Detect Lat/Lon based on direction letter (N/S vs E/W)
                    if (dir1 === 'N' || dir1 === 'S' || dir2 === 'E' || dir2 === 'W') {
                        lat = (dir1 === 'N' || dir1 === 'S') ? val1 : val2;
                        lon = (dir2 === 'E' || dir2 === 'W') ? val2 : val1;
                    } else if (dir2 === 'N' || dir2 === 'S' || dir1 === 'E' || dir1 === 'W') {
                        lat = (dir2 === 'N' || dir2 === 'S') ? val2 : val1;
                        lon = (dir1 === 'E' || dir1 === 'W') ? val1 : val2;
                    } else {
                        // Fallback based on value (>90 is definitely Longitude)
                        if (Math.abs(val1) > 90) { lon = val1; lat = val2; }
                        else { lat = val1; lon = val2; }
                    }

                    // Validate lat/lon ranges
                    if (!isNaN(lat) && !isNaN(lon) && lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) {
                        coords.push([lon, lat]);
                    }
                }
            });
            return coords;
        }

        // --- MAIN LOGIC: SPATIAL CALCULATION ---
        function processVoyageRoute(coordinates) {
            // Clear existing route if any
            if (routeLayer) {
                map.removeLayer(routeLayer);
            }

            // Create line geometry object (GeoJSON uses [lng, lat] format)
            const lineString = turf.lineString(coordinates);
            
            // Render route on map using Leaflet GeoJSON
            routeLayer = L.geoJSON(lineString, {
                style: {
                    color: '#1e3a8a',
                    weight: 3,
                    dashArray: '5, 5'
                }
            }).addTo(map);

            // Set map camera to route bounds
            const routeBounds = routeLayer.getBounds();
            map.fitBounds(routeBounds, { padding: [100, 100], maxZoom: 8 });

            document.getElementById('clear-btn').classList.remove('hidden');

            const affectedStations = [];
            
            // Loop through all stations to calculate closest distance to vessel route
            navtexStations.forEach(station => {
                const pt = turf.point([station.lng, station.lat]);
                // Turf calculates distance from point to closest line segment
                const distance = turf.pointToLineDistance(pt, lineString, { units: 'nauticalmiles' });
                
                if (distance <= station.range) {
                    affectedStations.push({
                        ...station,
                        distanceToRoute: distance.toFixed(1) // 1 decimal format
                    });
                }
            });

            // Sort by Station Alphabet (b1) then by country name
            affectedStations.sort((a, b) => {
                if (a.b1 === b.b1) return a.country.localeCompare(b.country);
                return a.b1.localeCompare(b.b1);
            });

            // Refresh Map Visual (Highlight affected stations in red)
            drawNavtexMap(affectedStations.map(s => s.id));

            // Update Left Sidebar UI & Prepare copy text
            renderSidebarList(affectedStations);
        }

        function renderSidebarList(stations) {
            const listContainer = document.getElementById('affected-list');
            const counter = document.getElementById('station-count');
            const copyBtn = document.getElementById('copy-btn');
            const copyArea = document.getElementById('copy-area');
            
            counter.innerText = stations.length;
            listContainer.innerHTML = '';
            
            let copyText = "NAVTEX STATIONS LIST (400 NM Radius):\n\n";

            if (stations.length === 0) {
                copyArea.value = "";
                copyBtn.classList.add('hidden');
                listContainer.innerHTML = `
                    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-center">
                        <i data-lucide="shield-alert" class="w-6 h-6 text-amber-500 mx-auto mb-2"></i>
                        <p class="text-sm text-amber-800 font-medium">Out of Coverage</p>
                        <p class="text-xs text-amber-600 mt-1">The voyage route is outside the NAVTEX coverage area.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            copyBtn.classList.remove('hidden');

            stations.forEach(st => {
                // Add data to copy string
                copyText += `${st.b1} - ${st.name} (${st.country})\n`;

                const div = document.createElement('div');
                // Calculate distance progress bar (closer = red, further = green)
                const distancePercent = Math.min((st.distanceToRoute / st.range) * 100, 100);
                const barColor = distancePercent < 30 ? 'bg-red-500' : (distancePercent < 70 ? 'bg-amber-500' : 'bg-emerald-500');

                div.className = "group relative bg-white p-3 border border-slate-200 rounded-xl shadow-sm hover:shadow-md hover:border-emerald-300 transition-all";
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-3">
                            <div class="flex items-center justify-center w-8 h-8 rounded-md bg-slate-900 text-white font-bold text-lg shadow-inner">
                                ${st.b1}
                            </div>
                            <div>
                                <h3 class="text-sm font-bold text-slate-800 leading-none">${st.name}</h3>
                                <p class="text-[10px] text-slate-500 mt-1 flex items-center gap-1">
                                    <i data-lucide="map-pin" class="w-3 h-3"></i> ${st.country} • ${st.range} NM
                                </p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-0.5">Closest Point</p>
                            <p class="text-sm font-bold text-slate-900">${st.distanceToRoute} <span class="text-[10px] text-slate-500">NM</span></p>
                        </div>
                    </div>
                    
                    <!-- Distance Visualization (Inverted Progress Bar) -->
                    <div class="w-full bg-slate-100 rounded-full h-1.5 mt-2 overflow-hidden flex">
                        <div class="h-1.5 ${barColor} rounded-full" style="width: ${100 - distancePercent}%"></div>
                    </div>
                `;
                listContainer.appendChild(div);
            });

            // Save to hidden textarea
            copyArea.value = copyText.trim();

            // Re-initialize icons inside the new list
            lucide.createIcons();
        }

        // --- COPY BUTTON HANDLER ---
        document.getElementById('copy-btn').addEventListener('click', function() {
            const copyArea = document.getElementById('copy-area');
            copyArea.select();
            copyArea.setSelectionRange(0, 99999); // For mobile
            
            try {
                document.execCommand('copy');
                // Temporarily change button appearance for feedback
                const btn = document.getElementById('copy-btn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check-check" class="w-3.5 h-3.5"></i> Copied!`;
                btn.classList.replace('text-blue-700', 'text-emerald-700');
                btn.classList.replace('bg-blue-50', 'bg-emerald-50');
                btn.classList.replace('border-blue-200', 'border-emerald-200');
                lucide.createIcons();
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('text-emerald-700', 'text-blue-700');
                    btn.classList.replace('bg-emerald-50', 'bg-blue-50');
                    btn.classList.replace('border-emerald-200', 'border-blue-200');
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                alert('Failed to copy. Please try again.');
            }
        });

        function resetApp() {
            // Remove route from Leaflet Map
            if (routeLayer) {
                map.removeLayer(routeLayer);
                routeLayer = null;
            }
            
            // Return markers and map to normal view
            drawNavtexMap([]); 
            
            // Reset UI
            document.getElementById('station-count').innerText = '0';
            document.getElementById('copy-btn').classList.add('hidden');
            document.getElementById('copy-area').value = "";
            document.getElementById('affected-list').innerHTML = `
                <div class="text-center py-8">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-slate-100 mb-3">
                        <i data-lucide="map" class="w-6 h-6 text-slate-400"></i>
                    </div>
                    <p class="text-sm font-medium text-slate-600">No route uploaded</p>
                    <p class="text-xs text-slate-400 mt-1">Upload a route to calculate 400 NM NAVTEX coverage.</p>
                </div>
            `;
            document.getElementById('route-upload').value = '';
            document.getElementById('clear-btn').classList.add('hidden');
            lucide.createIcons();
            
            // Return camera position to the center of Indonesia
            map.setView([-2.0, 118.0], 4, { animate: true });
        }

        document.getElementById('clear-btn').addEventListener('click', resetApp);
    </script>
